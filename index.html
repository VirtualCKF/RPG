    <style>
      /* ïŋ―jïŋ―ïŋ―ïŋ―Ðžg Unity ïŋ―bïŋ―ïŋ―ïŋ―ïŋ―ÝĨÍĶïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Íŋïŋ―Jïŋ―wïŋ―ïŋ―ïŋ―ØĶïŋ―m */

        top: 45% !important;  /* ïŋ―Lïŋ―ÕĄAïŋ―Tïŋ―Oïŋ―ïŋ―Lïŋ―uïŋ―Xïŋ―ÉĪïŋ―ïŋ―|ïŋ―ŨĶïŋ― */
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        width: 85% !important;
        max-width: 600px !important;
        z-index: 999999 !important;
        font-size: 16px !important;

      /* --- ïŋ―iïŋ―ÖĪïŋ―ïŋ―uïŋ―ÆĄGïŋ―ŅĻMïŋ―ïŋ―ïŋ―ïŋ―ïŋ―dïŋ―ÕĄj --- */
      /* 1. ïŋ―]ïŋ―wïŋ―ïŋ―ÂĶïŋ―Iïŋ―ïŋ―ïŋ―Cïŋ―ïŋ― (ïŋ―ïŋ―ïŋ―Pïŋ―Cïŋ―ïŋ― Loading ïŋ―Iïŋ―ïŋ―ïŋ―ïŋ―ÛĶPïŋ―Aïŋ―Ũ§Kïŋ―{ïŋ―{ïŋ―ÕĐïŋ―) */
      html, body {

        overflow: hidden;
        /* ïŋ―Nïŋ―Iïŋ―ïŋ―ïŋ―]ïŋ―ïŋ―ïŋ―ÂĶïŋ―Aïŋ―ïŋ―ïŋ―ïŋ―bïŋ―ïŋ―ïŋ―Jïŋ―ïŋ―ïŋ―Sïŋ―Xïŋ―ÕĐïŋ― */
        background-color: #000000; 
      }

      /* 2. ïŋ―jïŋ―ïŋ― Unity ïŋ―eïŋ―ïŋ―ïŋ―ņšĄūïŋ―ÓŋÃđïŋ― (ïŋ―]ïŋ―tïŋ―wïŋ―ïŋ―ïŋ―Ï°ïŋ―) */
      #unity-container {

        width: 100%;
        height: 100%; /* ïŋ―wïŋ―]ïŋ―ïŋ―ïŋ―ŨĄAïŋ―bïŋ―ïŋ―ïŋ―ïŋ―Ý·|ïŋ―Q Javascript ïŋ―Ðŧ\ïŋ―ïŋ― window.innerHeight */
        z-index: 1;

      /* 3. ïŋ―jïŋ―ïŋ― Canvas ïŋ―ņšĄŪeïŋ―ïŋ― */
      #unity-canvas {

      /* 4. ïŋ―uïŋ―ïŋ― Loading Bar ïŋ―ËĶïŋ―ïŋ―Aïŋ―Tïŋ―Oïŋ―bïŋ―ïŋ―ïŋ―Ãđïŋ―ïŋ―Uïŋ―mïŋ―ïŋ― */

  <body>
    <div id="unity-container" class="unity-desktop">
      <!-- ïŋ―`ïŋ―Nïŋ―Gïŋ―oïŋ―ĖŠïŋ― tabindex="-1" ïŋ―Oïŋ―ïŋ―ïŋ―Fïŋ―ïŋ― Canvas ïŋ―ïŋ―ïŋ―ïŋ―Jïŋ―Iïŋ―Hïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Lïŋ―ïŋ―J -->
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      // ïŋ―Û°ïŋ―ïŋ―ïŋ―ïŋ― Unity ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―`ïŋ―J URL ïŋ―Ņžïŋ―
      var unityVersion = "0.3731";
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/VirturalRPG_Online.loader.js?v=" + encodeURIComponent(unityVersion);
      var config = {
        dataUrl: buildUrl + "/VirturalRPG_Online.data.unityweb?v=" + encodeURIComponent(unityVersion),
        frameworkUrl: buildUrl + "/VirturalRPG_Online.framework.js.unityweb?v=" + encodeURIComponent(unityVersion),
        codeUrl: buildUrl + "/VirturalRPG_Online.wasm.unityweb?v=" + encodeURIComponent(unityVersion),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "RPG",
        productVersion: "0.3731",
        showBanner: unityShowBanner,
      };

      // ïŋ―ïŋ―ïŋ―î°Šïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ŅŠRïŋ―Ũīïŋ―Vïŋ―Aïŋ―ïŋ―ïŋ―ïŋ―Lïŋ―ïŋ―ïŋ―dïŋ―y
      config.devicePixelRatio = Math.min(window.devicePixelRatio, 1.4); 

      // --- ïŋ―iïŋ―ÖĪïŋ―ïŋ―uïŋ―ÆĄGïŋ―ïŋ―ïŋ―ïŋ―ÝĨïŋ―ïŋ―Ãđïŋ―ïŋ―Aïŋ―tïŋ―j ---
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        
        // (A) ïŋ―]ïŋ―wïŋ―ïŋ―ïŋ―ãŠš Viewport (ïŋ―]ïŋ―t viewport-fit=cover)
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover';
        document.getElementsByTagName('head')[0].appendChild(meta);

        // (B) ïŋ―jïŋ―ïŋ― Container ïŋ―ïŋ― fixed ïŋ―wïŋ―ïŋ―Aïŋ―Tïŋ―Oïŋ―bïŋ―ïŋ―ïŋ―ĘšÝĪïŋ―ïŋ―Qïŋ―sïŋ―ïŋ―ïŋ―ïŋ―UIïŋ―ïŋ―ïŋ―ïŋ―
        container.className = "unity-mobile";
        container.style.position = "fixed";
        container.style.width = "100%";
        // ïŋ―iïŋ―ïŋ―ïŋ―ïŋ―Ũ§ïŋ―jïŋ―jïŋ―î°Šïŋ―Ũģ]ïŋ―ïŋ― window.innerHeight ïŋ―Hïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Ú°ïŋ―ïŋ―ŨĄAïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―}ïŋ―Cïŋ―ïŋ―ïŋ―ïŋ―/ïŋ―ïŋ―ÜŠïŋ―ïŋ―ÜĪïŋ―
        container.style.height = window.innerHeight + "px"; 

        loadingBar.style.position = "fixed";

        // ïŋ―iïŋ―iïŋ―ïŋ―ïŋ―ÞĨïŋ―ïŋ―jïŋ―ïŋ―ÅĨïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ØĪoïŋ―ÜĪÆĄAïŋ―ïŋ―ïŋ―sïŋ―Õūïŋ― Container ïŋ―ïŋ―ïŋ―ŨĨHïŋ―Aïŋ―ïŋ― iOS ïŋ―ïŋ―ïŋ―ïŋ― App ïŋ―ŌĶïŋ―ïŋ―ïŋ― UI ïŋ―ÜĪïŋ―
        window.addEventListener('resize', function() {
            container.style.height = window.innerHeight + "px";
        });
      } else {
        // Desktop style: let the game canvas fill the entire canvas of the page container:
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }
      loadingBar.style.display = "block";

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          // ïŋ―ïŋ―ïŋ―Jïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Aïŋ―N Loading Bar ïŋ―q DOM ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―
          loadingBar.remove();
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
