    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- 魹ｽi魹ｽ魹ｽ魹ｽ魹ｽj魹ｽ魹ｽ魹ｽA魹ｽC魹ｽz魹ｽ魹ｽ魹ｽA魹ｽ魹ｽ魹ｽe魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾜｳﾌｳ魹ｽ魹ｽ魹ｽ -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- 魹ｽi魹ｽﾗｷ魹ｽ魹ｽu魹ｽﾆ｡j魹ｽj魹ｽ魹ｽ]魹ｽw viewport 魹ｽ魹ｽ魹ｽ魹ｽ iOS 魹ｽﾛｰ魹ｽ魹ｽY魹ｽ魹ｽ UI -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="TemplateData/icon200.png">
    <link rel="icon" type="image/png" sizes="200x200" href="TemplateData/icon200.png">
    <style>
      /* 魹ｽj魹ｽ魹ｽ魹ｽﾐｼg Unity 魹ｽ魹ｽL魹ｽ魹ｽJ魹ｽﾘｦ魹ｽm */
      input[type="text"], input[type="password"], textarea {
        position: fixed !important;
        bottom: auto !important;
        top: 40% !important; /* 魹ｽﾗｧK魹ｽ魹ｽL魹ｽB魹ｽ魹ｽ */
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        width: 85% !important;
        max-width: 600px !important;
        z-index: 999999 !important;
        font-size: 16px !important; /* 魹ｽ魹ｽ魹ｽ魹ｽ iOS 魹ｽI魹ｽ魹ｽ魹ｽ魹ｽJ魹ｽﾘｮ魹ｽ魹ｽY魹ｽ㗅ｶｭ魹ｽ */
        padding: 12px !important;
        background-color: #ffffff !important;
        color: #000000 !important;
        border: 2px solid #2196F3 !important;
        border-radius: 8px !important;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.3) !important;
      }

      /* 魹ｽ魹ｽﾂｦ魹ｽG魹ｽ魹ｽ魹ｽ]魹ｽw */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000000; /* 魹ｽ]魹ｽm魹ｽP魹ｽC魹ｽ魹ｽ魹ｽI魹ｽ魹ｽ魹ｽﾛｦP魹ｽ魹ｽ魹ｽC魹ｽ魹ｽ */
        position: fixed; /* 魹ｽ魹ｽ魹ｽ謁ｶ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽu魹ｽ魹ｽ */
      }

      #unity-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        /* 魹ｽT魹ｽO Canvas 魹ｽ魹ｽ魹ｽ|魹ｽW魹ｽX魹ｽe魹ｽ魹ｽ */
        object-fit: fill; 
      }

      #unity-loading-bar {
        position: absolute !important;
        z-index: 2;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      // --- 魹ｽq魹ｽﾎｪ魹ｽl魹ｽ魹ｽ ---
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      var unityVersion = "0.37351";
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/VirturalRPG_Online.loader.js?v=" + encodeURIComponent(unityVersion);
      var config = {
        dataUrl: buildUrl + "/VirturalRPG_Online.data.unityweb?v=" + encodeURIComponent(unityVersion),
        frameworkUrl: buildUrl + "/VirturalRPG_Online.framework.js.unityweb?v=" + encodeURIComponent(unityVersion),
        codeUrl: buildUrl + "/VirturalRPG_Online.wasm.unityweb?v=" + encodeURIComponent(unityVersion),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "RPG",
        productVersion: "0.37351",
        showBanner: unityShowBanner,
      };

      // 魹ｽ]魹ｽm魹ｽA魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾑｪR魹ｽ魹ｽ
      config.devicePixelRatio = Math.min(window.devicePixelRatio, 2); // 魹ｽﾌｰ魹ｽ魹ｽ莇ｩ Retina

      // --- 魹ｽi魹ｽﾖ､ﾟｭﾗ･魹ｽ魹ｽj魹ｽﾊｺA魹ｽ魹ｽ魹ｽﾃｹ魹ｽ魹ｽP UI 魹ｽ魹ｽﾒｭﾗ･魹ｽ ---
      function fixIOSFullscreenLayout() {
        if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
          // 1. 魹ｽj魹ｽ謁ｫ魹ｽ] scroll 魹ｽ魹ｽm魹ｽA魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ}魹ｽC魹ｽ魹ｽ魹ｽﾃｮﾉｯd魹ｽ魹ｽ
          window.scrollTo(0, 0);
          
          // 2. 魹ｽ魹ｽ魹ｽo魹ｽﾃｹ魹ｽ魹ｽ魹ｽ魹ｽz魹ｽ魹ｽ魹ｽ魹ｽ (window.screen.height 魹ｽb Web App 魹ｽﾒｦ魹ｽ魹ｽU魹ｽq魹ｽ`魹ｽO魹ｽ魹ｽ魹ｽT魹ｽ魹ｽ魹ｽ魹ｽ魹ｽz魹ｽ魹ｽ魹ｽ魹ｽ)
          // 魹ｽH魹ｽ魹ｽ Webview 魹ｽ魹ｽ clientHeight
          var screenH = window.screen.height;
          var clientH = document.documentElement.clientHeight;
          
          // 魹ｽp魹ｽG clientHeight 魹ｽp魹ｽ魹ｽ screenH魹ｽA魹ｽ魹ｽ魹ｽﾜｩ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾂｱ魹ｽ (魹ｽ]魹ｽ魹ｽ Web App 魹ｽ魹ｽ魹ｽﾃｹ魹ｽ魹ｽ魹ｽ魹ｽﾗｭp魹ｽ魹ｽ魹ｽ魹ｽ‾)
          if (clientH < screenH) {
            var heightToSet = screenH;
            
            // 魹ｽw魹ｽ魹ｽ iPhone X 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽA魹ｽﾝｭn魹ｽB魹ｽ‾魹ｽ[魹ｽW魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽw魹ｽ魹ｽ魹ｽﾏｰ瑗ｪ魹ｽﾗ｡A魹ｽT魹ｽO魹ｽ魹ｽ魹ｽL魹ｽﾂｱ魹ｽ
            // 魹ｽﾚｭﾌｰﾊｺA魹ｽp魹ｽ魹ｽ Body 魹ｽP Document 魹ｽ魹ｽ魹ｽt魹ｽﾈｨﾓｻ魹ｽ魹ｽU魹ｽP魹ｽ_
            var bodyH = document.body.clientHeight;
            if (bodyH > clientH) {
                 heightToSet += (bodyH - clientH);
            }

            // 魹ｽ魹ｽ魹ｽﾎｭp魹ｽ魹ｽX魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ
            container.style.height = heightToSet + "px";
            canvas.style.height = heightToSet + "px";
            
            // 魹ｽj魹ｽ魹ｽﾄｲ魹ｽo Unity 魹ｽ魹ｽ魹ｽs魹ｽﾕｾ网ｺ魹ｽ魹ｽ canvas 魹ｽj魹ｽp
            if(window.unityInstance) {
                window.unityInstance.SendMessage('GameManager', 'On魹ｽ魹ｽ魹ｽA''); // 魹ｽo魹ｽO魹ｽd魹ｽﾒ｡A魹ｽ魹ｽﾚｻﾝｬﾝｱz魹ｽ魹ｽ Unity 魹ｽ}魹ｽ魹ｽ魹ｽO魹ｽ_魹ｽ魹ｽ魹ｽ魹ｽ魹ｽT魹ｽ魹ｽ
                // 魹ｽY魹ｽL魹ｽS魹ｽ魹ｽ魹ｽ魹ｽ魹ｽf魹ｽA魹ｽq魹ｽ`魹ｽ魹ｽ魹ｽ魹ｽ CSS 魹ｽ魹ｽ Unity 魹ｽ|魹ｽﾛｰﾊｾA魹ｽt魹ｽA魹ｽY魹ｽS魹ｽ魹ｽ魹ｽA魹ｽﾝｭn魹ｽ魹ｽ魹ｽﾄｲ魹ｽo resize
                window.dispatchEvent(new Event('resize'));
            }
          }
          
          // 3. 魹ｽA魹ｽ魹ｽ魹ｽT魹ｽO viewport 魹ｽ]魹ｽw魹ｽ魹ｽ魹ｽT魹ｽA魹ｽ魹ｽ魹ｽ魹ｽ魹ｽY魹ｽ魹ｽ
          document.querySelector("meta[name=viewport]").content = 
            "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover";
        }
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
        loadingBar.style.display = "block";
        
        // 魹ｽ魹ｽﾅ･魹ｽU魹ｽﾘ･i魹ｽ魹ｽﾉｭP魹ｽG魹ｽ魹ｽ魹ｽﾜ､ﾆｪ魹ｽ魹ｽﾆ･魹ｽ
        window.addEventListener("load", fixIOSFullscreenLayout);
        window.addEventListener("resize", fixIOSFullscreenLayout);
        window.addEventListener("orientationchange", fixIOSFullscreenLayout);
        // 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ@魹ｽ魹ｽ魹ｽT魹ｽO DOM 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽV
        setTimeout(fixIOSFullscreenLayout, 500);
        setTimeout(fixIOSFullscreenLayout, 1000);

      } else {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }


      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          // 魹ｽN魹ｽ魹ｽﾒｦs魹ｽx魹ｽ_魹ｽﾓ｡A魹ｽH魹ｽK魹ｽ魹ｽ魹ｽ魹ｽﾕ･魹ｽ
          window.unityInstance = unityInstance;
          loadingBar.remove();
          // 魹ｽ魹ｽﾒ､ﾆｫ魹ｽA魹ｽ魹ｽ魹ｽﾗ･魹ｽ魹ｽG魹ｽ魹ｽ
          fixIOSFullscreenLayout();
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
