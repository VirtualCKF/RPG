<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />

    <!-- iOS Web App ïŋ―ïŋ―ïŋ―Ãđïŋ―ïŋ―Pïŋ―ïŋ―ïŋ―Aïŋ―Cïŋ―zïŋ―ïŋ―ïŋ―]ïŋ―w -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    
    <title>Unity WebGL Player | RPG</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="TemplateData/icon200.png">
    <link rel="icon" type="image/png" sizes="200x200" href="TemplateData/icon200.png">
    <style>
      /* ïŋ―jïŋ―ïŋ―ïŋ―Ðžg Unity ïŋ―ïŋ―Lïŋ―ïŋ―Jïŋ―ïŋ― */
      input[type="text"], input[type="password"], textarea {
        position: fixed !important;
        bottom: auto !important;
        top: 45% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        width: 85% !important;
        max-width: 600px !important;
        z-index: 999999 !important;
        font-size: 16px !important;
        padding: 12px !important;
        background-color: #ffffff !important;
        color: #000000 !important;
        border: 2px solid #2196F3 !important;
        border-radius: 8px !important;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.3) !important;
      }

      /* --- ïŋ―iïŋ―ïŋ―ïŋ―Pïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Gïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Âąïŋ―ïŋ―Pïŋ―dïŋ―ÕĄj --- */
      html, body {
        margin: 0;
        padding: 0;
        width: 100vw;
        /* ïŋ―ÏĨïŋ― fill-available ïŋ―ïŋ― 100% ïŋ―Tïŋ―Oïŋ―ïŋ―ïŋ―ŨĪïŋ―ïŋ―Yïŋ―ïŋ― */
        height: 100%;
        height: -webkit-fill-available; 
        overflow: hidden;
        background-color: #000000; 
      }

      #unity-container {
        position: fixed !important; /* ïŋ―ïŋ―ïŋ― fixed ïŋ―wïŋ―ėĻūïŋ―ïŋ―uïŋ―ĘŧPïŋ―ïŋ―ïŋ―ïŋ― */
        top: 0;
        left: 0;
        width: 100vw !important;
        /* ïŋ―ÖĪßĄGïŋ―ïŋ―ïŋ―ŨĨïŋ―ïŋ―ïŋ―ïŋ―jïŋ―ïŋ―ÔĶïŋ―ïŋ―ïŋ―Ãđïŋ―ïŋ―ĖĐïŋ―ïŋ―ïŋ―ïŋ―Aïŋ―ÃĨ[ïŋ―Wïŋ―wïŋ―ïŋ―ïŋ―Ï°ė°Šïŋ―ïŋ― */
        height: 100vh !important;
        height: calc(100vh + env(safe-area-inset-bottom)) !important;
        z-index: 1;
      }

      /* ïŋ―jïŋ―ïŋ― Canvas ïŋ―ïŋ―ïŋ―ïŋ―wïŋ―ïŋ―Ãķïŋ― Container */
      #unity-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      #unity-loading-bar {
        position: absolute !important;
        z-index: 2;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      var unityVersion = "0.3735";
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/VirturalRPG_Online.loader.js?v=" + encodeURIComponent(unityVersion);
      var config = {
        dataUrl: buildUrl + "/VirturalRPG_Online.data.unityweb?v=" + encodeURIComponent(unityVersion),
        frameworkUrl: buildUrl + "/VirturalRPG_Online.framework.js.unityweb?v=" + encodeURIComponent(unityVersion),
        codeUrl: buildUrl + "/VirturalRPG_Online.wasm.unityweb?v=" + encodeURIComponent(unityVersion),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "RPG",
        productVersion: "0.3735",
        showBanner: unityShowBanner,
      };

      config.devicePixelRatio = Math.min(window.devicePixelRatio, 1.4); 

      // ïŋ―ïŋ―ïŋ―ïŋ―Ýĩïŋ―ïŋ―ïŋ―]ïŋ―wïŋ―P Canvas ïŋ―jïŋ―îĐĩïŋ―ïŋ―
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        // ïŋ―ÖĪßĄGïŋ―ïŋ―ïŋ―ïŋ―ïŋ―]ïŋ―wïŋ―ïŋ― interactive-widget=resizes-content ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Lïŋ―uïŋ―Xïŋ―ÉķÂąïŋ―ïŋ―dïŋ―ïŋ―
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover, interactive-widget=resizes-content';
        document.getElementsByTagName('head')[0].appendChild(meta);

        container.className = "unity-mobile";
        
        // ïŋ―ŅĻM iOS ïŋ―ïŋ―ïŋ―ïŋ― App ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―pïŋ―âĪĢïŋ―ïŋ―ĮŠïŋ―ïŋ―ïŋ―ïŋ―D
        function resizeCanvasToFill() {
          // ïŋ―ĘšAïŋ―ïŋ―ïŋ― window.screen.heightïŋ―]ïŋ―ïŋ―ïŋ―zïŋ―Ãđïŋ―ïŋ―ïŋ―ïŋ―ŨĄ^ïŋ―ÓŦD window.innerHeight
          // ïŋ―oïŋ―ËĨiïŋ―Hïŋ―Tïŋ―O Canvas ïŋ―Qïŋ―jïŋ―ïŋ―ÔĶïŋ―ïŋ―L Home Indicator ïŋ―wïŋ―ïŋ―ïŋ―Ï°ïŋ―Aïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Âąïŋ―
          var realHeight = Math.max(window.innerHeight, window.screen.height);
          container.style.height = realHeight + "px";
          canvas.style.height = realHeight + "px";
        }

        // ïŋ―ïŋ―lïŋ―ïŋ―ïŋ―ïŋ―Pïŋ―ÆĨïŋ―ïŋ―ÅĨ
        resizeCanvasToFill();
        window.addEventListener('resize', resizeCanvasToFill);
        window.addEventListener('orientationchange', resizeCanvasToFill);
        
        loadingBar.style.position = "fixed";
      } else {
        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      loadingBar.style.display = "block";

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.remove();
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
