  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // --- 魹ｽi魹ｽ魹ｽ魹ｽﾖｨ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ 2魹ｽj魹ｽﾛｰ魹ｽ魹ｽ魹ｽ魹ｽ Unity 魹ｽ魹ｽ Version 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽﾃｪ`魹ｽJ URL 魹ｽﾑｼ魹ｽ ---
      var unityVersion = "0.366";
      var buildUrl = "Build";
      
      // 魹ｽﾛｰﾊｦb Loader 魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ[魹ｽW魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ]魹ｽp .js?v="0.2"魹ｽ^
      var loaderUrl = buildUrl + "/VirturalRPG_Online.loader.js?v=" + encodeURIComponent(unityVersion);
      var config = {
        // 魹ｽﾛｰﾊｦb魹ｽﾒｦ魹ｽ魹ｽﾖ､ﾟｸ彀ｽ魹ｽﾉｮﾗｫ魹ｽ魹ｽ[魹ｽW ?v=魹ｽ魹ｽ魹ｽ魹ｽ
        dataUrl: buildUrl + "/VirturalRPG_Online.data.unityweb?v=" + encodeURIComponent(unityVersion),
        frameworkUrl: buildUrl + "/VirturalRPG_Online.framework.js.unityweb?v=" + encodeURIComponent(unityVersion),
        codeUrl: buildUrl + "/VirturalRPG_Online.wasm.unityweb?v=" + encodeURIComponent(unityVersion),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "RPG",
        productVersion: "0.366",
        showBanner: unityShowBanner,
      };

      // --- 魹ｽi魹ｽﾖ､魹ｽ WebGL Post-Processing 魹ｽy魹ｽZ魹ｽ魹ｽ魹ｽu魹ｽﾆ｡j ---
      // 魹ｽ魹ｽ魹ｽ譔ｪ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ]魹ｽp iPhone Retina 魹ｽﾃｹ魹ｽ魹ｽ^魹ｽW魹ｽ魹ｽ魹ｽﾑｪR魹ｽﾗｴ魹ｽV魹ｽA魹ｽ魹ｽ魹ｽ魹ｽ GPU 魹ｽL魹ｽ魹ｽ魹ｽo魹ｽS魹ｽA魹ｽﾑｨM 10 魹ｽ魹ｽ魹ｽ皴ｰ魹ｽW魹ｽd魹ｽy
      config.devicePixelRatio = Math.min(window.devicePixelRatio, 1.4); 

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';

        //meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        //document.getElementsByTagName('head')[0].appendChild(meta);

        // 魹ｽb viewport 魹ｽ魹ｽ魹ｽ[魹ｽJ viewport-fit=cover魹ｽA魹ｽo魹ｽO魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ嘨｡ｪ魹ｽ魹ｽA魹ｽ魹ｽw魹ｽ魹ｽ魹ｽﾏｰ琯ｺ魹ｽ魹ｽ魹ｽ魹ｽ
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover';
        document.getElementsByTagName('head')[0].appendChild(meta);
        
        // =======================================================================
        // 魹ｽi魹ｽ魹ｽ魹ｽ魹ｽﾝｮﾖ､ﾟｭﾗ･魹ｽ魹ｽj魹ｽj魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ[魹ｽ魹ｽ魹ｽﾘｦb魹ｽ魹ｽ魹ｽ魹ｽW魹ｽ]魹ｽO魹ｽ魹ｽ魹ｽﾃｹ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽw魹ｽ魹ｽA魹ｽ魹ｽ魹ｽ魹ｽQ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ}魹ｽC魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ
        container.className = "unity-mobile";
        loadingBar.style.position = "fixed";
        // =======================================================================
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          // =======================================================================
          // 魹ｽi魹ｽN魹ｽ琨ｻ魹ｽ魹ｽ loadingBar.style.display = "none"; 魹ｽﾗｧ騤ｰ魹ｽH魹ｽU魹ｽo魹ｽ魹ｽj
          // 魹ｽ魹ｽ魹ｽJ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽA魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ Loading 魹ｽe魹ｽ魹ｽ魹ｽq魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽu魹ｽﾞｱ魹ｽ魹ｽP魹ｽ魹ｽ魹ｽv魹ｽA魹ｽO魹ｽﾒｵ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽ魹ｽB魹ｽ魹ｽ魹ｽ魹ｽ魹ｽd魹ｽe魹ｽ魹ｽ魹ｽI
          loadingBar.remove(); 
          // =======================================================================
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
