      /* ïŋ―sïŋ―Wïŋ―Gïŋ―jïŋ―ïŋ― Unity ïŋ―eïŋ―ïŋ―ïŋ―Pïŋ―eïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Ôšïŋ―ïŋ―Aïŋ―ÃļÉĻïŋ―ïŋ―ïŋ―ïŋ―Aïŋ―Cïŋ―Qïŋ―Yïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ― */

        /* ïŋ―ïŋ―ïŋ―ïŋ―Gïŋ―ÏĨïŋ― 100dvhïŋ―]ïŋ―ĘšAïŋ―ïŋ―ïŋ―ŨĄ^ïŋ―[ïŋ―Wïŋ―wïŋ―ïŋ―ïŋ―Ï°ïŋ―ïŋ―ïŋ―vïŋ―Aïŋ―ïŋ―ïŋ―îĐģïŋ―ïŋ―ïŋ―Xïŋ―{ïŋ―ïŋ―ïŋ―ïŋ― */

      /* ïŋ―jïŋ―ïŋ―ïŋ―Ðžg Unity ïŋ―bïŋ―ïŋ―ïŋ―ïŋ―ÝĨÍĶïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Íŋïŋ―Jïŋ―wïŋ―ïŋ―ïŋ―ØĶïŋ―m */

        padding: 12px !important;

  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // --- ïŋ―iïŋ―ïŋ―ïŋ―ÖĻïŋ―ïŋ―ïŋ―ïŋ―ïŋ― 2ïŋ―jïŋ―Û°ïŋ―ïŋ―ïŋ―ïŋ― Unity ïŋ―ïŋ― Version ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ÃŠ`ïŋ―J URL ïŋ―Ņžïŋ― ---
      var unityVersion = "0.384";
      var buildUrl = "Build";
      
      // ïŋ―Û°ĘĶb Loader ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―[ïŋ―Wïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―]ïŋ―p .js?v="0.2"ïŋ―^
      var loaderUrl = buildUrl + "/VirturalRPG_Online.loader.js?v=" + encodeURIComponent(unityVersion);
      var config = {
        // ïŋ―Û°ĘĶbïŋ―ŌĶïŋ―ïŋ―ÖĪßļę·―ïŋ―ÉŪŨŦïŋ―ïŋ―[ïŋ―W ?v=ïŋ―ïŋ―ïŋ―ïŋ―
        dataUrl: buildUrl + "/VirturalRPG_Online.data.unityweb?v=" + encodeURIComponent(unityVersion),
        frameworkUrl: buildUrl + "/VirturalRPG_Online.framework.js.unityweb?v=" + encodeURIComponent(unityVersion),
        codeUrl: buildUrl + "/VirturalRPG_Online.wasm.unityweb?v=" + encodeURIComponent(unityVersion),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "RPG",
        productVersion: "0.384",
        showBanner: unityShowBanner,
      };

      // --- ïŋ―iïŋ―ÖĪïŋ― WebGL Post-Processing ïŋ―yïŋ―Zïŋ―ïŋ―ïŋ―uïŋ―ÆĄj ---
      // ïŋ―ïŋ―ïŋ―î°Šïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―]ïŋ―p iPhone Retina ïŋ―Ãđïŋ―ïŋ―^ïŋ―Wïŋ―ïŋ―ïŋ―ŅŠRïŋ―Ũīïŋ―Vïŋ―Aïŋ―ïŋ―ïŋ―ïŋ― GPU ïŋ―Lïŋ―ïŋ―ïŋ―oïŋ―Sïŋ―Aïŋ―ŅĻM 10 ïŋ―ïŋ―ïŋ―á­°ïŋ―Wïŋ―dïŋ―y
      config.devicePixelRatio = Math.min(window.devicePixelRatio, 1.4); 

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover';
        document.getElementsByTagName('head')[0].appendChild(meta);
        
        container.className = "unity-mobile";
        loadingBar.style.position = "fixed";

        // Âēïŋ―ïŋ― JavaScript ïŋ―ÕĨïŋ―ïŋ―Gïŋ―uïŋ―Ý―Tïŋ―Oïŋ―eïŋ―ïŋ―ïŋ―Pïŋ―eïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ËĶïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―æĩđ CSS ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Yïŋ―i
        function forceFullScreen() {
          container.style.top = "0px";
          canvas.style.top = "0px";
          container.style.height = "calc(100vh + env(safe-area-inset-top))";
          canvas.style.height = "calc(100vh + env(safe-area-inset-top))";
        }
        
        window.addEventListener('resize', forceFullScreen);
        window.addEventListener('orientationchange', forceFullScreen);
        window.addEventListener('pageshow', forceFullScreen);
        forceFullScreen();
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          // =======================================================================
          // ïŋ―iïŋ―Nïŋ―ėĨŧïŋ―ïŋ― loadingBar.style.display = "none"; ïŋ―Ũ§ïŽ°ïŋ―Hïŋ―Uïŋ―oïŋ―ïŋ―j
          // ïŋ―ïŋ―ïŋ―Jïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Aïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ― Loading ïŋ―eïŋ―ïŋ―ïŋ―qïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―uïŋ―Þąïŋ―ïŋ―Pïŋ―ïŋ―ïŋ―vïŋ―Aïŋ―Oïŋ―Ōĩïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―Bïŋ―ïŋ―ïŋ―ïŋ―ïŋ―dïŋ―eïŋ―ïŋ―ïŋ―I
          loadingBar.remove(); 
          // =======================================================================
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
