<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- 1. е…Ёиһўе№• PWA жЁЎејҸиҲҮиЁӯе®ҡзӢҖж…ӢеҲ—зӮәйҖҸжҳҺ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Unity WebGL Player | RPG</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="TemplateData/icon200.png">
    <link rel="icon" type="image/png" sizes="200x200" href="TemplateData/icon200.png">
    <style>
      /* и®“ html иҲҮ body зҡ„иғҢжҷҜз¬ҰеҗҲйҒҠжҲІиүІиӘҝпјҢзӢҖж…ӢеҲ—йҖҸжҳҺеҫҢиғҢжҷҜжүҚдёҚжңғйңІзҷҪ */
      html, body {
        background-color: #231F20; /* йҖҷиЈЎеҸҜж”№зӮәдҪ йҒҠжҲІзҡ„д»ЈиЎЁиғҢжҷҜиүІпјҲй җиЁӯж·ұзҒ°пјү */
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      
      input[type="text"], input[type="password"], textarea {
        position: fixed !important;
        bottom: auto !important;   
        top: 50% !important;        
        left: 50% !important; 
        transform: translate(-50%, -50%) !important; 
        
        width: 85% !important;       
        max-width: 600px !important; 
        z-index: 999999 !important;  
        font-size: 16px !important;  
        
        padding: 12px !important;
        background-color: #ffffff !important;
        color: #000000 !important;
        border: 2px solid #2196F3 !important; 
        border-radius: 8px !important;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.3) !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      window.addEventListener("load", function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("ServiceWorker.js");
        }
      });

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      // --- пҝҪiпҝҪпҝҪпҝҪЦЁпҝҪпҝҪпҝҪпҝҪпҝҪ 2пҝҪjпҝҪЫ°пҝҪпҝҪпҝҪпҝҪ Unity пҝҪпҝҪ Version пҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪГӘ`пҝҪJ URL пҝҪСјпҝҪ ---
      var unityVersion = "0.35";
      var buildUrl = "Build";
      
      // пҝҪЫ°КҰb Loader пҝҪпҝҪпҝҪпҝҪпҝҪ[пҝҪWпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪ]пҝҪp .js?v="0.2"пҝҪ^
      var loaderUrl = buildUrl + "/VirturalRPG_Online.loader.js?v=" + encodeURIComponent(unityVersion);
      var config = {
        // пҝҪЫ°КҰbпҝҪТҰпҝҪпҝҪЦӨЯёк·ҪпҝҪЙ®Ч«пҝҪпҝҪ[пҝҪW ?v=пҝҪпҝҪпҝҪпҝҪ
        dataUrl: buildUrl + "/VirturalRPG_Online.data.unityweb?v=" + encodeURIComponent(unityVersion),
        frameworkUrl: buildUrl + "/VirturalRPG_Online.framework.js.unityweb?v=" + encodeURIComponent(unityVersion),
        codeUrl: buildUrl + "/VirturalRPG_Online.wasm.unityweb?v=" + encodeURIComponent(unityVersion),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "RPG",
        productVersion: "0.35",
        showBanner: unityShowBanner,
      };

      // --- пҝҪiпҝҪЦӨпҝҪ WebGL Post-Processing пҝҪyпҝҪZпҝҪпҝҪпҝҪuпҝҪЖЎj ---
      // пҝҪпҝҪпҝҪо°ӘпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪ]пҝҪp iPhone Retina пҝҪГ№пҝҪпҝҪ^пҝҪWпҝҪпҝҪпҝҪСӘRпҝҪЧҙпҝҪVпҝҪAпҝҪпҝҪпҝҪпҝҪ GPU пҝҪLпҝҪпҝҪпҝҪoпҝҪSпҝҪAпҝҪСЁM 10 пҝҪпҝҪпҝҪбӯ°пҝҪWпҝҪdпҝҪy
      config.devicePixelRatio = Math.min(window.devicePixelRatio, 1.4); 

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        
        // =======================================================================
        // пҝҪiпҝҪпҝҪпҝҪпҝҪЭ®ЦӨЯӯЧҘпҝҪпҝҪjпҝҪjпҝҪпҝҪпҝҪпҝҪпҝҪ[пҝҪпҝҪпҝҪШҰbпҝҪпҝҪпҝҪпҝҪWпҝҪ]пҝҪOпҝҪпҝҪпҝҪГ№пҝҪпҝҪпҝҪпҝҪпҝҪwпҝҪпҝҪAпҝҪпҝҪпҝҪпҝҪQпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪ}пҝҪCпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪ
        container.className = "unity-mobile";
        loadingBar.style.position = "fixed";
        // =======================================================================
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          // =======================================================================
          // пҝҪiпҝҪNпҝҪмҘ»пҝҪпҝҪ loadingBar.style.display = "none"; пҝҪЧ§п¬°пҝҪHпҝҪUпҝҪoпҝҪпҝҪj
          // пҝҪпҝҪпҝҪJпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪAпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪ Loading пҝҪeпҝҪпҝҪпҝҪqпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪuпҝҪЮұпҝҪпҝҪPпҝҪпҝҪпҝҪvпҝҪAпҝҪOпҝҪТөпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪпҝҪBпҝҪпҝҪпҝҪпҝҪпҝҪdпҝҪeпҝҪпҝҪпҝҪI
          loadingBar.remove(); 
          // =======================================================================
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
